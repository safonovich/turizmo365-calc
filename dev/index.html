<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TURIZMO 365 — Калькулятор</title>
<!-- PWA / iOS Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Turizmo365">
<link rel="apple-touch-icon" href="./logo.png">
<link rel="manifest" href="./manifest.json">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --primary: #1d4ed8;
  --primary-light: #eff6ff;
  --accent: #16a34a;
  --accent-light: #f0fdf4;
  --text: #1e293b;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --gold: #d97706;
  --gold-light: #fffbeb;
  --red: #dc2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  min-height: 100vh;
  padding-bottom: 140px;
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, #14532d 0%, #15803d 55%, #22c55e 100%);
  color: white;
  padding: 14px 16px 12px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 14px rgba(21,128,61,0.45);
}
.header-logo { height: 38px; display: block; margin: 0 auto 6px; }
.header h1 { font-size: 18px; font-weight: 800; letter-spacing: 0.3px; }
.header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

/* ─── HISTORY ─── */
.btn-history {
  background: none; border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--text-muted); font-size: 13px; cursor: pointer;
  padding: 5px 0; width: 100%; border-radius: 8px; margin-top: 6px;
}
.btn-history:active { opacity: .75; }
.hist-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
}
.hist-box {
  background: white; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 500px; max-height: 80vh;
  display: flex; flex-direction: column;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
}
.hist-head {
  padding: 16px 18px 12px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 16px; flex-shrink: 0;
}
.hist-head button {
  background: #f1f5f9; border: none; border-radius: 8px;
  width: 32px; height: 32px; font-size: 16px; cursor: pointer; color: var(--text-muted);
}
.hist-list { overflow-y: auto; flex: 1; padding: 8px 0; }
.hist-item {
  padding: 12px 18px; border-bottom: 1px solid #f1f5f9;
  cursor: pointer; display: flex; align-items: center; gap: 12px;
}
.hist-item:active { background: #f8fafc; }
.hist-item-info { flex: 1; min-width: 0; }
.hist-item-date { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
.hist-item-total { font-size: 16px; font-weight: 700; color: var(--primary); }
.hist-item-summary { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.hist-restore { background: var(--primary-light); color: var(--primary); border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.hist-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }

/* ─── CARDS ─── */
.card {
  background: var(--card);
  margin: 10px 12px;
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ─── VIP SELECTOR ─── */
.vip-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.vip-btn {
  padding: 10px 2px 8px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: white;
  cursor: pointer;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  transition: all 0.15s;
  line-height: 1.3;
}
.vip-btn small { font-size: 10px; font-weight: 500; display: block; color: var(--text-muted); }
.vip-btn.active {
  border-color: var(--gold);
  background: var(--gold-light);
  color: var(--gold);
}
.vip-btn.active small { color: var(--gold); }
.vip-btn:first-child.active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.vip-btn:first-child.active small { color: var(--primary); }

/* ─── DAYS ─── */
.days-row {
  display: flex;
  align-items: center;
  gap: 0;
  justify-content: center;
}
.btn-circle {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  font-size: 26px;
  font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.1s;
  line-height: 1;
}
.btn-circle:active { background: #dbeafe; }
.days-center {
  flex: 1;
  text-align: center;
  padding: 0 10px;
}
.days-big {
  font-size: 42px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}
.days-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}
.days-rate-badge {
  display: inline-block;
  background: #f1f5f9;
  color: var(--text-muted);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  margin-top: 6px;
}
.warn-box {
  background: #fff7ed;
  border: 1.5px solid #fed7aa;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  color: #c2410c;
  margin-top: 12px;
  display: none;
  align-items: center;
  gap: 8px;
}
.warn-box.show { display: flex; }

/* ─── CATEGORY TABS ─── */
.cat-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 8px 16px;
  border-radius: 24px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  color: var(--text-muted);
  transition: all 0.15s;
  flex-shrink: 0;
}
.cat-tab.active {
  border-color: var(--primary);
  background: var(--primary);
  color: white;
}

/* ─── EQUIPMENT ITEMS ─── */
.eq-section { display: none; }
.eq-section.show { display: block; }

.eq-item {
  display: flex;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.eq-item:last-child { border-bottom: none; padding-bottom: 0; }
.eq-info { flex: 1; min-width: 0; }
.eq-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.eq-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.eq-price { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 3px; }
.eq-price.vip { color: var(--gold); }

.qty-ctrl {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.qty-btn {
  width: 32px; height: 32px;
  border-radius: 9px;
  border: 1.5px solid #1d4ed8;
  background: #ffffff;
  font-size: 20px;
  font-weight: 400;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #1d4ed8;
  transition: all 0.1s;
  line-height: 1;
}
.qty-btn.minus:active, .qty-btn.plus:active { background: var(--primary-light); border-color: var(--primary); }
.qty-num {
  width: 44px;
  text-align: center;
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  border: none;
  background: transparent;
  -moz-appearance: textfield;
  outline: none;
  padding: 0;
}
.qty-num::-webkit-inner-spin-button,
.qty-num::-webkit-outer-spin-button { -webkit-appearance: none; }
.qty-num.has-qty { color: var(--primary); }
.days-big-input {
  font-size: 42px;
  font-weight: 800;
  color: var(--primary);
  text-align: center;
  width: 80px;
  border: none;
  background: transparent;
  outline: none;
  -moz-appearance: textfield;
  line-height: 1;
  display: block;
  margin: 0 auto;
}
.days-big-input::-webkit-inner-spin-button,
.days-big-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.date-input {
  width: 100% !important;
  font-size: 14px !important;
  padding: 8px 10px !important;
}

/* ─── SERVICES ─── */
.svc-item {
  display: flex;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
}
.svc-item:last-child { border-bottom: none; }
.svc-check {
  width: 24px; height: 24px;
  border-radius: 7px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.svc-check.on {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.svc-check.on::after { content: '✓'; font-size: 14px; font-weight: 700; }
.svc-info { flex: 1; }
.svc-name { font-size: 14px; font-weight: 600; }
.svc-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ─── BREAKDOWN ─── */
.breakdown {
  margin: 0 12px 10px;
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.breakdown-header {
  padding: 14px 16px 0;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
}
.breakdown-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 13px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.breakdown-item:last-child { border-bottom: none; }
.breakdown-item .bn { color: var(--text-muted); flex: 1; padding-right: 8px; }
.breakdown-item .bp { font-weight: 700; white-space: nowrap; }
.breakdown-total {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--primary-light);
  font-weight: 800;
  font-size: 15px;
  color: var(--primary);
}

/* ─── STICKY TOTAL ─── */
.sticky-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1px solid var(--border);
  padding: 12px 16px 16px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
  z-index: 100;
}
.sticky-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.sticky-label { font-size: 13px; color: var(--text-muted); }
.sticky-saving {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  margin-top: 2px;
}
.sticky-total {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.btn-copy {
  flex: 1;
  padding: 10px 6px;
  background: linear-gradient(135deg, var(--primary), #1e40af);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.2px;
  box-shadow: 0 4px 14px rgba(29,78,216,0.35);
  transition: opacity 0.15s;
  white-space: nowrap;
}
.btn-copy:active { opacity: 0.88; }
.btn-kp {
  flex: 1;
  padding: 10px 6px;
  background: linear-gradient(135deg, #15803d, #16a34a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.2px;
  box-shadow: 0 4px 14px rgba(22,163,74,0.35);
  transition: opacity 0.15s;
  white-space: nowrap;
}
.btn-kp:active { opacity: 0.88; }
.btn-reset {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 0 0;
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* ─── DATE RANGE PICKER ─── */
.date-range-btn {
  width:100%; padding:11px 14px; border:1.5px solid var(--border);
  border-radius:12px; background:var(--primary-light); color:var(--primary);
  font-size:14px; font-weight:600; cursor:pointer; display:flex;
  justify-content:space-between; align-items:center; margin-bottom:14px; text-align:left;
}
.date-range-btn:active { opacity:.8; }
.cal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200;
  display:flex; align-items:flex-end; justify-content:center;
}
.cal-box {
  background:white; border-radius:20px 20px 0 0; padding:20px 16px;
  width:100%; max-width:440px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
}
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cal-nav {
  background:var(--primary-light); border:none; color:var(--primary);
  font-size:18px; width:36px; height:36px; border-radius:10px; cursor:pointer; font-weight:700;
}
.cal-month-title { font-weight:700; font-size:15px; text-align:center; }
.cal-hint { font-size:11px; color:var(--text-muted); text-align:center; margin-top:2px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-top:6px; }
.cal-dow { text-align:center; font-size:11px; font-weight:700; color:var(--text-muted); padding:4px 0; }
.cal-day {
  text-align:center; padding:9px 2px; border-radius:8px;
  cursor:pointer; font-size:14px; line-height:1; user-select:none;
}
.cal-day.empty { cursor:default; }
.cal-day:not(.empty):hover { background:var(--primary-light); }
.cal-day.today { font-weight:700; outline:1.5px solid var(--primary); outline-offset:-1px; border-radius:8px; }
.cal-day.start,.cal-day.end { background:var(--primary) !important; color:white !important; font-weight:700; }
.cal-day.in-range { background:var(--primary-light); color:var(--primary); }

/* ─── PRINT (КП) ─── */
@media print {
  @page { margin: 0; size: A4 portrait; }
  body > *:not(#kp-overlay) { display: none !important; }
  #kp-overlay {
    position: static !important;
    overflow: visible !important;
    background: white !important;
    height: auto !important;
    z-index: auto !important;
    box-shadow: none !important;
  }
  #kp-overlay .kp-toolbar { display: none !important; }
  #kp-overlay > div { max-width: 100% !important; padding: 1.5cm !important; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* ─── DELIVERY CALC ─── */
.svc-expand {
  display: none;
  background: #f0f4f8;
  border: 1.5px solid #cbd5e1;
  border-radius: 14px;
  padding: 14px;
  margin: 4px 0 8px 36px;
}
.svc-expand.show { display: block; }
.svc-expand-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: #64748b;
  margin-bottom: 12px;
}
.dlv-label { color: #1e293b !important; }
.dlv-result-row .rn { color: #64748b !important; }
.dlv-result-row .rv { color: #1e293b !important; font-weight: 600; }
.dlv-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 8px;
}
.dlv-label {
  font-size: 13px;
  color: var(--text);
  flex: 1;
  line-height: 1.3;
}
.dlv-input {
  width: 90px;
  padding: 8px 10px;
  border: 1.5px solid #cbd5e1;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  text-align: right;
  background: #ffffff;
  color: #1d4ed8;
  outline: none;
  flex-shrink: 0;
}
.dlv-input:focus { border-color: #1d4ed8; }
.dlv-input.small { width: 70px; }
.dlv-input[type="text"] { width: 100%; text-align: left; font-size: 13px; font-weight: 500; color: #1e293b; }
.btn-route {
  width: 100%; margin: 8px 0 4px;
  background: var(--primary); color: white;
  border: none; border-radius: 12px;
  padding: 11px; font-size: 14px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.3px;
}
.btn-route:disabled { opacity: 0.6; cursor: wait; }
.dlv-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 10px 0;
}
.dlv-result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  padding: 3px 0;
}
.dlv-result-row .rn { color: var(--text-muted); }
.dlv-result-row .rv { font-weight: 700; color: var(--text); }
.dlv-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--primary-light);
  border-radius: 10px;
  padding: 10px 12px;
  margin-top: 8px;
}
.dlv-total-row .tn { font-weight: 700; color: var(--primary); font-size: 13px; }
.dlv-total-row .tv { font-weight: 900; color: var(--primary); font-size: 17px; }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: #1e293b;
  color: white;
  padding: 14px 24px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 700;
  z-index: 999;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <img src="./logo.png" class="header-logo" onerror="this.style.display='none'" alt="">
  <h1>TURIZMO 365</h1>
  <p>Внутренний калькулятор аренды</p>
</div>

<!-- VIP LEVEL -->
<div class="card">
  <div class="card-title">⭐ Уровень клиента</div>
  <div class="vip-row">
    <button class="vip-btn active" data-vip="ррц" onclick="setVip(this)">РРЦ<small>Стандарт</small></button>
    <button class="vip-btn" data-vip="vip1" onclick="setVip(this)">VIP1<small>−5%</small></button>
    <button class="vip-btn" data-vip="vip2" onclick="setVip(this)">VIP2<small>−15%</small></button>
    <button class="vip-btn" data-vip="vip3" onclick="setVip(this)">VIP3<small>−20%</small></button>
    <button class="vip-btn" data-vip="vip4" onclick="setVip(this)">VIP4<small>−25%</small></button>
  </div>
</div>

<!-- DAYS + DATES -->
<div class="card">
  <div class="card-title">📅 Даты и срок аренды</div>
  <button class="date-range-btn" onclick="openDatePicker()">
    <span id="date-range-label">📅 Выбрать даты аренды</span>
    <span>›</span>
  </button>
  <div class="days-row">
    <button class="btn-circle" onclick="changeDays(-1)">−</button>
    <div class="days-center">
      <input type="number" class="days-big-input" id="days-num" value="1" min="1" max="21"
        oninput="setDaysManual(this.value)">
      <div class="days-label">суток</div>
      <div class="days-rate-badge" id="rate-badge">Стандартный тариф</div>
    </div>
    <button class="btn-circle" onclick="changeDays(1)">+</button>
  </div>
  <div class="warn-box" id="warn-weekend">
    ⚠️ В выходные/праздники — минимум 3 суток
  </div>
</div>

<!-- EQUIPMENT -->
<div class="card">
  <div class="card-title">⛺ Снаряжение</div>
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="setCat('splav', this)">🚣 Сплавы</button>
    <button class="cat-tab" onclick="setCat('kemping', this)">🏕 Кемпинг</button>
    <button class="cat-tab" onclick="setCat('acc', this)">🎒 Аксессуары</button>

// ════════════════════════════════════════════

// ════════════════════════════════════════════
function boatPrice(boat, days) {
  if (days >= 1 && days <= 7) {
    const p = boat.prices[days - 1];
    if (p !== null && p !== undefined) return p;
    // SAP с 5+ тарифом
    if (boat.rate5plus) {
      const base4 = boat.prices[3];
      return base4 + (days - 4) * boat.rate5plus;
    }
    return boat.prices[6] || boat.prices[boat.prices.length - 1];
  }
  if (days >= 8 && days <= 14) {
    if (boat.rate8_14) return days * boat.rate8_14;
    if (boat.rate5plus) return boat.prices[3] + (days - 4) * boat.rate5plus;
  }
  if (days >= 15 && days <= 21) {
    if (boat.rate15_21) return days * boat.rate15_21;
    if (boat.rate5plus) return boat.prices[3] + (days - 4) * boat.rate5plus;
  }
  // Fallback
  if (boat.rate5plus) return boat.prices[3] + (days - 4) * boat.rate5plus;
  const rateDay = (boat.rate15_21 || boat.rate8_14 || boat.prices[6] / 7);
  return Math.round(days * rateDay);
}

function accPrice(item, days) {
  // flat за ≤7 дней, пропорционально сверх
  if (days <= 7) return item.price7;
  return Math.round(item.price7 / 7 * days);
}

function kempPrice(item, days) {
  if (days <= 7) return item.price7;
  return Math.round(item.price7 / 7 * days);
}

function applyDisc(price, cat) {
  const d = (DISC[cat] || DISC.boats)[S.vip] || 0;
  return Math.round(price * (1 - d));
}

function calcAll() {
  let total = 0, base = 0;
  const lines = [];

  BOATS.forEach(b => {
    const qty = S.qty[b.id] || 0;
    if (!qty) return;
    const bp = boatPrice(b, S.days);
    const vp = applyDisc(bp, 'boats');
    base += bp * qty;
    total += vp * qty;
    lines.push({ name: b.name, qty, price: vp * qty, unitPrice: vp });
  });

  ACCS.forEach(a => {
    const qty = S.qty[a.id] || 0;
    if (!qty) return;
    const bp = accPrice(a, S.days);
    const vp = applyDisc(bp, 'acc');
    base += bp * qty;
    total += vp * qty;
    lines.push({ name: a.name, qty, price: vp * qty, unitPrice: vp });
  });

  KEMP.forEach(k => {
    const qty = S.qty[k.id] || 0;
    if (!qty) return;
    const bp = kempPrice(k, S.days);
    const vp = applyDisc(bp, 'kemping');
    base += bp * qty;
    total += vp * qty;
    lines.push({ name: k.name, qty, price: vp * qty, unitPrice: vp });
  });

  SVCS.forEach(s => {
    if (!S.svcs[s.id]) return;
    if (s.hasCalc) {
      if (transportPrice > 0) { total += transportPrice; base += transportPrice; lines.push({ name: s.name, qty:1, price: transportPrice }); }
      return;
    }
    // services with a fixed price (wash_palatka, wash_spalnyi)
    if (s.price) {
      total += s.price;
      base += s.price;
      lines.push({ name: s.name, qty: 1, price: s.price });
      return;
    }
    // auto-calculated per-unit services (assembly/wash kayaks & SUPs)
    if (SVC_RATES[s.id]) {
      const r = SVC_RATES[s.id];
      let n = 0;
      BOATS.forEach(b => { if (r.ids.has(b.id)) n += (S.qty[b.id] || 0); });
      const ap = n * r.per;
      if (ap > 0) {
        total += ap; base += ap;
        lines.push({ name: s.name, qty: n, price: ap, unitPrice: r.per });
      }
      return;
    }
    // Кастомная услуга с произвольным названием и ценой
    if (s.isCustom) {
      const cp = S.svcPrices[s.id] || 0;
      const cname = s.id === 'custom' ? (S.customSvcName || 'Своя услуга') : (S.customSvcName2 || 'Своя услуга');
      if (cp > 0) {
        total += cp; base += cp;
        lines.push({ name: cname, qty: 1, price: cp });
      }
      return;
    }
    // "Включено" services with editable price (lager, etc.)
    const ep = S.svcPrices[s.id] || 0;
    if (ep > 0) {
      total += ep;
      base += ep;
      lines.push({ name: s.name, qty: 1, price: ep });
    }
  });

  return { total, savings: base - total, lines };
}

      : fmt(vp);

    </div>`;
  }).join('');
}

function renderServices() {
  document.getElementById('services-list').innerHTML = SVCS.map(s => {
    const on = S.svcs[s.id];

    // ── Кастомная услуга ──
    if (s.isCustom) {
      const curName  = (s.id === 'custom' ? S.customSvcName : S.customSvcName2) || '';
      const curPrice = S.svcPrices[s.id] || '';
      const itemHtml = `<div class="svc-item" onclick="toggleSvc('${s.id}')">
        <div class="svc-check ${on?'on':''}"></div>
        <div class="svc-info">
          <div class="svc-name">✏️ ${curName || 'Своя услуга'}</div>
          <div class="svc-desc">${on && curPrice > 0 ? `<b style="color:var(--primary)">${fmt(curPrice)}</b>` : 'Введите название и цену'}</div>
        </div>
      </div>`;
      const expandHtml = on ? `<div class="svc-expand" style="display:block;padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px;">
        <div>
          <div class="dlv-label" style="font-size:12px;margin-bottom:4px;">Название услуги</div>
          <input type="text" class="dlv-input" style="width:100%;max-width:280px;"
            placeholder="Например: Аренда весел" value="${curName}"
            onclick="event.stopPropagation()"
            oninput="setCustomName('${s.id}',this.value)">
        </div>
        <div>
          <div class="dlv-label" style="font-size:12px;margin-bottom:4px;">Стоимость, ₽</div>
          <input type="number" class="dlv-input" style="width:100%;max-width:180px;"
            placeholder="0" value="${curPrice}"
            onclick="event.stopPropagation()"
            oninput="setSvcPrice('${s.id}',this.value)">
        </div>
      </div>` : '';
      return itemHtml + expandHtml;
    }

    // ── Обычные услуги ──
    let priceStr;
    if (s.hasCalc) {
      priceStr = on && transportPrice > 0
        ? `<b style="color:var(--primary)">${fmt(transportPrice)}</b>`
        : (on ? 'Введите адреса ниже' : 'Включить для расчёта');
    } else if (s.price) {
      priceStr = fmt(s.price);
    } else if (SVC_RATES[s.id]) {
      const ap = autoSvcPrice(s.id);
      const r = SVC_RATES[s.id];
      let n = 0; BOATS.forEach(b => { if (r.ids.has(b.id)) n += (S.qty[b.id]||0); });
      priceStr = ap > 0
        ? `<b style="color:var(--primary)">${fmt(ap)}</b> <span style="font-size:11px;color:#94a3b8;">(${n} ${r.unit} × ${r.per}₽)</span>`
        : `${r.per}₽ / ${r.unit}`;
    } else {
      const ep = S.svcPrices[s.id] || 0;
      priceStr = ep > 0 ? `<b style="color:var(--primary)">${fmt(ep)}</b>` : 'Включено';
    }
    const itemHtml = `<div class="svc-item" onclick="toggleSvc('${s.id}')">
      <div class="svc-check ${on?'on':''}"></div>
      <div class="svc-info">
        <div class="svc-name">${s.tag} ${s.name}</div>
        <div class="svc-desc">${s.desc} — ${priceStr}</div>
      </div>
    </div>`;
    let priceInputHtml = '';
    if (on && !s.hasCalc && !s.price && !SVC_RATES[s.id]) {
      const curVal = S.svcPrices[s.id] || '';
      priceInputHtml = `<div class="svc-expand" style="display:block;padding:10px 14px 12px;">
        <div class="dlv-label" style="font-size:12px;margin-bottom:6px;">Стоимость услуги, ₽</div>
        <input type="number" class="dlv-input" style="width:100%;max-width:180px;"
          placeholder="0" value="${curVal}"
          onclick="event.stopPropagation()"
          oninput="setSvcPrice('${s.id}',this.value)">
      </div>`;
    }
    const expandHtml = (on && s.hasCalc) ? dlvCalcPanel() : '';
    return itemHtml + priceInputHtml + expandHtml;
  }).join('');
}

function changeDays(d) {
  S.days = Math.max(1, Math.min(21, S.days + d));
  if (S.dateFrom) {
    const d1 = new Date(S.dateFrom);
    d1.setDate(d1.getDate() + S.days);
    S.dateTo = d1.toISOString().slice(0,10);
  }
  document.getElementById('warn-weekend').classList.remove('show');
  updateDateRangeLabel();
  renderAll();
}

function setDaysManual(val) {
  const n = Math.max(1, Math.min(21, parseInt(val) || 1));
  S.days = n;
  if (S.dateFrom) {
    const d1 = new Date(S.dateFrom);
    d1.setDate(d1.getDate() + n);
    S.dateTo = d1.toISOString().slice(0,10);
  }
  updateDateRangeLabel();
  renderAll();
}

function setDateFrom(val) {
  S.dateFrom = val;
  if (S.dateTo && val > S.dateTo) { S.dateTo = ''; }
  updateDateRangeLabel();
  calcDaysFromDates();
}

function setDateTo(val) {
  S.dateTo = val;
  updateDateRangeLabel();
  calcDaysFromDates();
}

function calcDaysFromDates() {
  if (S.dateFrom && S.dateTo && S.dateTo > S.dateFrom) {
    const diff = Math.round((new Date(S.dateTo) - new Date(S.dateFrom)) / 86400000);
    if (diff >= 1) {
      S.days = Math.min(21, diff);
      const el = document.getElementById('days-num');
      if (el) el.value = S.days;
      renderAll();
      return;
    }
  }
  renderAll();
}

  renderServices();

function togglePickup() {
  S.dlv.withPickup = !S.dlv.withPickup;
  S.dlv.driverDays = S.dlv.withPickup ? 2 : 1;
  if (S.dlv.km > 0) computeTransport();
  renderServices();
  updateTotals();
}

function setDlvField(field, value) {
  S.dlv[field] = parseFloat(value) || 0;
  if (S.dlv.km > 0) {
    computeTransport();
    // Обновляем только итоги (без полного ре-рендера — фокус не теряется)
    const r = S.dlvResult;
    if (r) {
      const rows = document.querySelectorAll('.dlv-result-row .rv');
      if (rows.length >= 5) {
        rows[0].textContent = fmt2(r.costPerKm) + ' р/км';
        rows[1].textContent = fmt(r.tripCost);
        rows[2].textContent = fmt(r.salaryTotal);
        rows[3].textContent = fmt(r.cost);
        rows[4].textContent = fmt(r.profit);
      }
      const tv = document.querySelector('.dlv-total-row .tv');
      if (tv) tv.textContent = fmt(r.total);
    }
    updateTotals();
  }
}

function computeTransport() {
  const d = S.dlv;
  if (!d.km) return;
  const legs        = d.withPickup ? 4 : 2;
  const costPerKm   = (d.fuelPrice * d.fuelRate / 100) + d.amort; // л/100км
  const tripCost    = Math.round(costPerKm * d.km * legs);
  const salaryTotal = Math.round(d.salary * d.driverDays);
  const cost        = tripCost + salaryTotal;
  const profit      = Math.round(cost * d.margin / 100);
  const total       = cost + profit;
  S.dlvResult       = { costPerKm, tripCost, salaryTotal, cost, profit, total };
  transportPrice    = total;
}

// ─── Геокодирование + маршрут (OpenStreetMap/OSRM, бесплатно) ───
async function calcRoute() {
  const fromEl = document.getElementById('dlv-from');
  const toEl   = document.getElementById('dlv-to');
  const from   = (fromEl ? fromEl.value : '') || S.dlv.addrFrom;
  const to     = (toEl   ? toEl.value   : '') || S.dlv.addrTo;
  S.dlv.addrFrom = from; S.dlv.addrTo = to;

  const btn    = document.getElementById('btn-route');
  const status = document.getElementById('route-status');
  if (!from || !to) { status.textContent = '⚠️ Введите оба адреса'; return; }

  btn.disabled = true; btn.textContent = '⏳ Считаем...';
  status.textContent = '';

  try {
    const geo = async (q) => {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&accept-language=ru`,
        { headers: { 'User-Agent': 'turizmo365-calc/1.0' } }
      );
      const j = await r.json();
      if (!j.length) throw new Error(`Адрес не найден: "${q}"`);
      return { lat: parseFloat(j[0].lat), lon: parseFloat(j[0].lon) };
    };

    const [A, B] = await Promise.all([geo(from), geo(to)]);
    const route  = await fetch(
      `https://router.project-osrm.org/route/v1/driving/${A.lon},${A.lat};${B.lon},${B.lat}?overview=false`
    );
    const rj = await route.json();
    if (rj.code !== 'Ok') throw new Error('Маршрут не найден (OSRM)');

    const km = Math.round(rj.routes[0].distance / 1000);
    S.dlv.km = km;
    computeTransport();
    renderServices();
    updateTotals();
    // восстановить адреса в полях после рендера
    setTimeout(() => {
      const f = document.getElementById('dlv-from');
      const t = document.getElementById('dlv-to');
      if (f) f.value = from;
      if (t) t.value = to;
      if (status) status.innerHTML = `✅ Маршрут: <b>${km} км</b> в одну сторону`;
    }, 0);
  } catch(e) {
    status.textContent = '❌ ' + e.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🗺 Рассчитать маршрут'; }
  }
}

function fmt2(n) { return (+n).toFixed(2); }

function copyCalc() {
  const { total, savings, lines } = calcAll();
  if (lines.length === 0) {
    showToast('⚠️ Добавьте снаряжение!');
    return;
  }

  const today = new Date().toLocaleDateString('ru-RU', {day:'2-digit', month:'long', year:'numeric'});

  // Разделяем снаряжение и услуги
  const svcNames = new Set([
    ...SVCS.map(s => s.name).filter(Boolean),
    S.customSvcName, S.customSvcName2,
  ]);
  const equipLines = lines.filter(l => !svcNames.has(l.name));
  const svcLines   = lines.filter(l =>  svcNames.has(l.name));
  const equipTotal = equipLines.reduce((s, l) => s + l.price, 0);
  const svcTotal   = svcLines.reduce((s, l) => s + l.price, 0);

  let text = `🏕 TURIZMO 365 — Расчёт аренды\n`;
  text += `${'─'.repeat(28)}\n`;
  text += `📅 Дата составления: ${today}\n`;
  if (S.dateFrom) {
    const df = new Date(S.dateFrom).toLocaleDateString('ru-RU', {day:'2-digit', month:'long', year:'numeric'});
    text += `🗓 Начало аренды: ${df}\n`;
  }
  if (S.dateTo) {
    const dt = new Date(S.dateTo).toLocaleDateString('ru-RU', {day:'2-digit', month:'long', year:'numeric'});
    text += `🗓 Конец аренды: ${dt}\n`;
  }

  // Блок снаряжения
  if (equipLines.length > 0) {
    text += `📦 Снаряжение:\n`;
    equipLines.forEach(l => {
      const qty = l.qty > 1 ? l.qty + ' шт' : '1 шт';
      const unitP = l.unitPrice ? fmt(l.unitPrice) : fmt(l.price);
      text += `  • ${l.name} / ${qty} / ${unitP} / ${fmt(l.price)}\n`;
    });
    text += `  Итого снаряжение: ${fmt(equipTotal)}\n`;
  }

  // Блок услуг
  if (svcLines.length > 0) {
    text += `\n🔧 Услуги:\n`;
    svcLines.forEach(l => {
      const qty = l.qty > 1 ? l.qty + ' шт' : '1 шт';
      const unitP = l.unitPrice ? fmt(l.unitPrice) : fmt(l.price);
      text += `  • ${l.name} / ${qty} / ${unitP} / ${fmt(l.price)}\n`;
    });
    if (svcTotal > 0) text += `  Итого услуги: ${fmt(svcTotal)}\n`;
  }

  text += `${'─'.repeat(28)}\n`;
  text += `💰 ИТОГО: ${fmt(total)}`;

  saveHistory();
  navigator.clipboard.writeText(text)
    .then(() => showToast('✅ Скопировано!'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast('✅ Скопировано!'); }
      catch(e) { showToast('❌ Не удалось скопировать'); }
      document.body.removeChild(ta);
    });
}

function dayWord(n) {

function generateKP() {
  const { total, savings, lines } = calcAll();
  if (lines.length === 0) {
    showToast('⚠️ Добавьте оборудование в заказ');
    return;
  }

  const today = new Date().toLocaleDateString('ru-RU', { day:'2-digit', month:'long', year:'numeric' });
  const vipLabels = { 'ррц':'РРЦ (без скидки)', 'vip1':'VIP-1 (15%)', 'vip2':'VIP-2 (20%)', 'vip3':'VIP-3 (25%)', 'vip4':'VIP-4 (30%)' };
  const vipLabel = vipLabels[S.vip] || S.vip;
  const dayText = S.days === 1 ? '1 сутки' : S.days + ' суток';

  const rowsHtml = lines.map(l => `
    <tr>
      <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;">${l.name}${l.qty > 1 ? ` &times;${l.qty}` : ''}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;text-align:right;white-space:nowrap;">${l.price.toLocaleString('ru-RU')} ₽</td>
    </tr>`).join('');

  const savingsRow = savings > 0 ? `
    <tr>
      <td style="padding:8px 12px;color:#16a34a;">Скидка</td>
      <td style="padding:8px 12px;text-align:right;color:#16a34a;">−${savings.toLocaleString('ru-RU')} ₽</td>
    </tr>` : '';

  // Build overlay with KP preview — works in Telegram Mobile (screenshot) + Desktop (print→PDF)
  const overlay = document.createElement('div');
  overlay.id = 'kp-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#f0f4f8;z-index:9999;overflow-y:auto;-webkit-overflow-scrolling:touch;';

  overlay.innerHTML = `

      <button id="kp-close-btn" style="background:rgba(255,255,255,.2);border:none;color:white;border-radius:8px;padding:7px 14px;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0;">✕</button>

    </div>

        <div><div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:2px;">Дата составления</div>${today}</div>
        ${S.dateFrom ? `<div><div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:2px;">Начало аренды</div>${new Date(S.dateFrom).toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'})}</div>` : ''}
        ${S.dateTo ? `<div><div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:2px;">Конец аренды</div>${new Date(S.dateTo).toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'})}</div>` : ''}
      </div>
      <div style="background:white;border-radius:14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);">
        <div style="background:#f0f4f8;padding:10px 16px;display:grid;grid-template-columns:1fr auto auto auto;gap:6px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;">
          <span>Позиция</span><span style="text-align:right;">Кол-во</span><span style="text-align:right;">Цена за ед.</span><span style="text-align:right;">Сумма</span>
        </div>
        ${lines.map(l => `<div style="display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:center;padding:10px 16px;border-bottom:1px solid #f1f5f9;font-size:13px;">
          <span>${l.name}</span>
          <span style="color:#64748b;white-space:nowrap;text-align:right;">${l.qty > 1 ? l.qty + ' шт' : '1 шт'}</span>
          <span style="color:#94a3b8;white-space:nowrap;font-size:12px;text-align:right;">${(l.unitPrice || l.price).toLocaleString('ru-RU')} ₽</span>
          <span style="font-weight:600;white-space:nowrap;text-align:right;">${l.price.toLocaleString('ru-RU')} ₽</span>
        </div>`).join('')}
        ${savings > 0 ? `<div style="display:flex;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #f1f5f9;font-size:14px;color:#16a34a;">
          <span>Скидка</span><span style="font-weight:600;">−${savings.toLocaleString('ru-RU')} ₽</span>
        </div>` : ''}
        <div style="display:flex;justify-content:space-between;padding:14px 16px;background:#eff6ff;border-top:2px solid #1d4ed8;">
          <span style="font-weight:700;font-size:16px;color:#1d4ed8;">ИТОГО К ОПЛАТЕ</span>
          <span style="font-weight:800;font-size:18px;color:#1d4ed8;">${total.toLocaleString('ru-RU')} ₽</span>
        </div>
      </div>
      <div style="text-align:center;margin-top:16px;font-size:12px;color:#94a3b8;">${today}</div>
    </div>`;

  // Сохраняем данные КП глобально для kpPrint()
  window._kpData = { lines, total, savings, today, dayText, dateFrom: S.dateFrom, dateTo: S.dateTo };
  saveHistory();

  document.body.appendChild(overlay);

  // Вешаем слушатели ПОСЛЕ добавления в DOM — надёжнее чем onclick в innerHTML
  document.getElementById('kp-close-btn').addEventListener('click', function() {
    overlay.remove();
  });
  document.getElementById('kp-pdf-btn').addEventListener('click', function() {
    kpPrint();
  });
}

function kpPrint() {
  const d = window._kpData;
  if (!d) return;

  const tg = window.Telegram?.WebApp;
  const isTelegramMobile = tg && tg.initData && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  if (isTelegramMobile) {
    tg.showPopup && tg.showPopup({
      title: '📄 PDF',
      message: 'В Telegram печать недоступна.\nОткройте в браузере Safari:\n' + window.location.href + '\nи нажмите PDF там.',
      buttons: [{ id: 'ok', type: 'ok', text: 'Понятно' }]
    });
    return;
  }

  const baseUrl = window.location.href.replace(/[^\/]+$/, '');

  // Строим строки таблицы
  const itemRows = d.lines.map(l => {
    const hasUnit = l.unitPrice;
    return `<tr>
      <td>${l.name}</td>
      <td style="text-align:center;">${l.qty > 1 ? l.qty + ' шт.' : '1 шт.'}</td>
      <td style="text-align:right;">${(l.unitPrice || l.price).toLocaleString('ru-RU')} ₽</td>
      <td>${l.price.toLocaleString('ru-RU')} ₽</td>
    </tr>`;
  }).join('');

  const discountRow = '';

  const df = d.dateFrom ? new Date(d.dateFrom).toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'}) : '';
  const dt = d.dateTo   ? new Date(d.dateTo).toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'}) : '';

  const metaHtml = `
    <td><div class="mlabel">Дата составления</div><div>${d.today}</div></td>
    ${df ? `<td><div class="mlabel">Начало аренды</div><div>${df}</div></td>` : ''}
    ${dt ? `<td><div class="mlabel">Конец аренды</div><div>${dt}</div></td>` : ''}
  `;

  const printWin = window.open('', '_blank');
  if (!printWin) { window.print(); return; }

  printWin.document.write(`<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8">
<title>КП — TURIZMO 365</title>
<base href="${baseUrl}">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; color:#1e293b; background:white; padding:24px 28px; }
@page { size:A4 portrait; margin:0; }
@media print { body { padding:1.5cm; } * { -webkit-print-color-adjust:exact; print-color-adjust:exact; } .no-print { display:none !important; } }

.hdr { display:table; width:100%; margin-bottom:18px; }
.hdr-logo { display:table-cell; width:58px; vertical-align:middle; }
.hdr-logo img { height:48px; display:block; }

.hdr-info .s1 { font-size:13px; color:#475569; }
.hdr-info .s2 { font-size:11px; color:#94a3b8; margin-top:2px; }

table.meta { width:100%; border-collapse:collapse; margin-bottom:18px; }
table.meta td { padding:0 20px 0 0; vertical-align:top; font-size:13px; }
.mlabel { font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }

table.items { width:100%; border-collapse:collapse; }
table.items thead tr { background:#f0f4f8; }
table.items thead th { padding:8px 12px; text-align:left; font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; border:1px solid #e2e8f0; }
table.items thead th:nth-child(2) { text-align:center; }
table.items thead th:nth-child(3) { text-align:right; }
table.items td:nth-child(2) { text-align:center; }
table.items td:nth-child(3) { text-align:right; white-space:nowrap; color:#475569; }
table.items thead th:last-child { text-align:right; }
table.items td { padding:9px 12px; border:1px solid #e8edf3; font-size:13px; }
table.items td:last-child { text-align:right; white-space:nowrap; font-weight:600; }
tr.disc td { color:#16a34a; }
tr.tot { background:#eff6ff; }
tr.tot td { padding:11px 12px; border:2px solid #1d4ed8; font-weight:700; font-size:14px; color:#1d4ed8; }
tr.tot td:last-child { font-size:17px; font-weight:800; }

</style>
</head>
<body>

  <button onclick="window.close()" style="padding:12px 28px;background:#f1f5f9;border:1.5px solid #cbd5e1;border-radius:12px;font-size:15px;font-weight:600;color:#475569;cursor:pointer;">✕ Закрыть окно</button>

  printWin.document.close();
}

// ════════════════════════════════════════════
//  DATE RANGE PICKER
// ════════════════════════════════════════════
let _calYear, _calMonth, _calSel1, _calSel2;

function updateDateRangeLabel() {
  const el = document.getElementById('date-range-label');
  if (!el) return;
  if (S.dateFrom && S.dateTo) {
    const df = new Date(S.dateFrom + 'T12:00').toLocaleDateString('ru-RU', {day:'2-digit', month:'short'});
    const dt = new Date(S.dateTo + 'T12:00').toLocaleDateString('ru-RU', {day:'2-digit', month:'short'});
    el.textContent = '📅 ' + df + ' → ' + dt;
  } else if (S.dateFrom) {
    const df = new Date(S.dateFrom + 'T12:00').toLocaleDateString('ru-RU', {day:'2-digit', month:'short'});
    el.textContent = '📅 С ' + df + ' → ...';
  } else {
    el.textContent = '📅 Выбрать даты аренды';
  }
}

function openDatePicker() {
  const now = new Date();
  _calYear = S.dateFrom ? +S.dateFrom.slice(0,4) : now.getFullYear();
  _calMonth = S.dateFrom ? +S.dateFrom.slice(5,7) - 1 : now.getMonth();
  _calSel1 = S.dateFrom || null;
  _calSel2 = S.dateTo || null;
  renderCal();
}

function renderCal() {
  const existing = document.getElementById('cal-overlay');
  if (existing) existing.remove();

  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const DOWS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const today = new Date().toISOString().slice(0,10);
  const firstDay = new Date(_calYear, _calMonth, 1);
  const lastDate = new Date(_calYear, _calMonth + 1, 0).getDate();
  let startDow = firstDay.getDay(); // 0=Вс
  startDow = startDow === 0 ? 6 : startDow - 1; // Пн=0

  let hint = '';
  if (_calSel1 && _calSel2) {
    const df = new Date(_calSel1+'T12:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'short'});
    const dt = new Date(_calSel2+'T12:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'short'});
    hint = df + ' → ' + dt;
  } else if (_calSel1) {
    hint = 'Теперь выберите дату окончания';
  } else {
    hint = 'Выберите дату начала аренды';
  }

  let gridHtml = DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < startDow; i++) gridHtml += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= lastDate; d++) {
    const ds = _calYear + '-' + String(_calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    let cls = 'cal-day';
    if (ds === today) cls += ' today';
    if (ds === _calSel1) cls += ' start';
    if (ds === _calSel2) cls += ' end';
    if (_calSel1 && _calSel2 && ds > _calSel1 && ds < _calSel2) cls += ' in-range';
    gridHtml += `<div class="${cls}" data-date="${ds}">${d}</div>`;
  }

  const applyBtn = (_calSel1 && _calSel2)
    ? `<button id="cal-apply" style="width:100%;margin-top:14px;padding:13px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;">✓ Применить</button>`
    : '';

  const ov = document.createElement('div');
  ov.id = 'cal-overlay';
  ov.className = 'cal-overlay';
  ov.innerHTML = `
    <div class="cal-box">
      <div class="cal-header">
        <button class="cal-nav" id="cal-prev">‹</button>
        <div>
          <div class="cal-month-title">${MONTHS[_calMonth]} ${_calYear}</div>
          <div class="cal-hint">${hint}</div>
        </div>
        <button class="cal-nav" id="cal-next">›</button>
      </div>
      <div class="cal-grid">${gridHtml}</div>
      ${applyBtn}
    </div>`;

  document.body.appendChild(ov);

  ov.addEventListener('click', function(e) { if (e.target === ov) closeDatePicker(); });
  document.getElementById('cal-prev').addEventListener('click', function() {
    _calMonth--; if (_calMonth < 0) { _calMonth = 11; _calYear--; } renderCal();
  });
  document.getElementById('cal-next').addEventListener('click', function() {
    _calMonth++; if (_calMonth > 11) { _calMonth = 0; _calYear++; } renderCal();
  });
  const applyEl = document.getElementById('cal-apply');
  if (applyEl) applyEl.addEventListener('click', function() { applyDateRange(); closeDatePicker(); });

  ov.querySelectorAll('.cal-day[data-date]').forEach(function(el) {
    el.addEventListener('click', function() {
      const date = this.dataset.date;
      if (!_calSel1 || (_calSel1 && _calSel2) || date < _calSel1) {
        _calSel1 = date; _calSel2 = null;
      } else if (date === _calSel1) {
        _calSel1 = null; _calSel2 = null;
      } else {
        _calSel2 = date;
        applyDateRange();
        closeDatePicker();
        return;
      }
      renderCal();
    });
  });
}

function applyDateRange() {
  if (_calSel1) { S.dateFrom = _calSel1; }
  if (_calSel2) { S.dateTo = _calSel2; }
  if (_calSel1 && _calSel2) {
    const diff = Math.round((new Date(_calSel2) - new Date(_calSel1)) / 86400000);
    if (diff >= 1) S.days = Math.min(21, diff);
  }
  updateDateRangeLabel();
  renderAll();
}

function closeDatePicker() {
  const ov = document.getElementById('cal-overlay');
  if (ov) ov.remove();
}

// ════════════════════════════════════════════
//  ИСТОРИЯ РАСЧЁТОВ
// ════════════════════════════════════════════
const HIST_KEY = 't365_history';
const HIST_MAX = 10;

function saveHistory() {
  const { total, lines } = calcAll();
  if (lines.length === 0) return;

  const now = new Date();
  const dateStr = now.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
  const timeStr = now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });

  const summary = lines.slice(0, 4).map(l => l.name + (l.qty > 1 ? ' ×' + l.qty : '')).join(', ')
    + (lines.length > 4 ? ` и ещё ${lines.length - 4}` : '');

  const entry = {
    ts: now.getTime(),
    dateStr,
    timeStr,
    total,
    days: S.days,
    dateFrom: S.dateFrom,
    dateTo: S.dateTo,
    vip: S.vip,
    qty: JSON.parse(JSON.stringify(S.qty)),
    svcs: JSON.parse(JSON.stringify(S.svcs)),
    svcPrices: JSON.parse(JSON.stringify(S.svcPrices)),
    transportPrice,
    summary
  };

  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
  hist.unshift(entry);
  if (hist.length > HIST_MAX) hist = hist.slice(0, HIST_MAX);
  try { localStorage.setItem(HIST_KEY, JSON.stringify(hist)); } catch(e) {}
}

function openHistory() {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}

  const overlay = document.createElement('div');
  overlay.className = 'hist-overlay';
  overlay.id = 'hist-overlay';

  const fmt = n => n.toLocaleString('ru-RU') + ' ₽';
  const fmtDates = e => {
    if (e.dateFrom && e.dateTo) {
      const df = new Date(e.dateFrom).toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit'});
      const dt = new Date(e.dateTo).toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit'});
      return `${df}–${dt}, `;
    }
    return '';
  };

  let itemsHtml = '';
  if (hist.length === 0) {
    itemsHtml = '<div class="hist-empty">История пуста.<br>Сформируйте КП или скопируйте расчёт.</div>';
  } else {
    itemsHtml = hist.map((e, i) => `
      <div class="hist-item">
        <div class="hist-item-info">
          <div class="hist-item-date">${e.dateStr} ${e.timeStr} · ${fmtDates(e)}${e.days} ${e.days===1?'сутки':'суток'}</div>
          <div class="hist-item-total">${fmt(e.total)}</div>
          <div class="hist-item-summary">${e.summary}</div>
        </div>
        <button class="hist-restore" data-idx="${i}">Восстановить</button>
      </div>
    `).join('');
  }

  overlay.innerHTML = `
    <div class="hist-box">
      <div class="hist-head">
        <span>📜 История расчётов</span>
        <button id="hist-close">✕</button>
      </div>
      <div class="hist-list">${itemsHtml}</div>
    </div>
  `;

  document.body.appendChild(overlay);

  document.getElementById('hist-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelectorAll('.hist-restore').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.getAttribute('data-idx'));
      restoreFromHistory(hist[idx]);
      overlay.remove();
    });
  });
}

function restoreFromHistory(entry) {
  S.qty = JSON.parse(JSON.stringify(entry.qty));
  S.svcs = JSON.parse(JSON.stringify(entry.svcs));
  S.svcPrices = JSON.parse(JSON.stringify(entry.svcPrices));
  S.days = entry.days;
  S.dateFrom = entry.dateFrom || '';
  S.dateTo = entry.dateTo || '';
  S.vip = entry.vip || 'ррц';
  transportPrice = entry.transportPrice || 0;
  S.dlvResult = null;

  // Обновляем кнопки VIP
  const vipOrder = ['ррц', 'базовый', 'стандартный', 'премиум'];
  document.querySelectorAll('.vip-btn').forEach((b, i) => {
    b.classList.toggle('active', vipOrder[i] === S.vip);
  });

  updateDateRangeLabel();
  renderAll();
  showToast('✅ Расчёт восстановлен!');
}

// ════════════════════════════════════════════

// ════════════════════════════════════════════
renderAll();
</script>
