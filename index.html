<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TURIZMO 365 — Калькулятор</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --primary: #1d4ed8;
  --primary-light: #eff6ff;
  --accent: #16a34a;
  --accent-light: #f0fdf4;
  --text: #1e293b;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --gold: #d97706;
  --gold-light: #fffbeb;
  --red: #dc2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  min-height: 100vh;
  padding-bottom: 140px;
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
  color: white;
  padding: 18px 16px 14px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 12px rgba(37,99,235,0.4);
}
.header h1 { font-size: 19px; font-weight: 800; letter-spacing: 0.3px; }
.header p { font-size: 12px; opacity: 0.75; margin-top: 3px; }

/* ─── CARDS ─── */
.card {
  background: var(--card);
  margin: 10px 12px;
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ─── VIP SELECTOR ─── */
.vip-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.vip-btn {
  padding: 10px 2px 8px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: white;
  cursor: pointer;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  transition: all 0.15s;
  line-height: 1.3;
}
.vip-btn small { font-size: 10px; font-weight: 500; display: block; color: var(--text-muted); }
.vip-btn.active {
  border-color: var(--gold);
  background: var(--gold-light);
  color: var(--gold);
}
.vip-btn.active small { color: var(--gold); }
.vip-btn:first-child.active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.vip-btn:first-child.active small { color: var(--primary); }

/* ─── DAYS ─── */
.days-row {
  display: flex;
  align-items: center;
  gap: 0;
  justify-content: center;
}
.btn-circle {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  font-size: 26px;
  font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.1s;
  line-height: 1;
}
.btn-circle:active { background: #dbeafe; }
.days-center {
  flex: 1;
  text-align: center;
  padding: 0 10px;
}
.days-big {
  font-size: 42px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}
.days-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}
.days-rate-badge {
  display: inline-block;
  background: #f1f5f9;
  color: var(--text-muted);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  margin-top: 6px;
}
.warn-box {
  background: #fff7ed;
  border: 1.5px solid #fed7aa;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  color: #c2410c;
  margin-top: 12px;
  display: none;
  align-items: center;
  gap: 8px;
}
.warn-box.show { display: flex; }

/* ─── CATEGORY TABS ─── */
.cat-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 8px 16px;
  border-radius: 24px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  color: var(--text-muted);
  transition: all 0.15s;
  flex-shrink: 0;
}
.cat-tab.active {
  border-color: var(--primary);
  background: var(--primary);
  color: white;
}

/* ─── EQUIPMENT ITEMS ─── */
.eq-section { display: none; }
.eq-section.show { display: block; }

.eq-item {
  display: flex;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.eq-item:last-child { border-bottom: none; padding-bottom: 0; }
.eq-info { flex: 1; min-width: 0; }
.eq-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.eq-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.eq-price { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 3px; }
.eq-price.vip { color: var(--gold); }

.qty-ctrl {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.qty-btn {
  width: 32px; height: 32px;
  border-radius: 9px;
  border: 1.5px solid #1d4ed8;
  background: #ffffff;
  font-size: 20px;
  font-weight: 400;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #1d4ed8;
  transition: all 0.1s;
  line-height: 1;
}
.qty-btn.minus:active, .qty-btn.plus:active { background: var(--primary-light); border-color: var(--primary); }
.qty-num {
  min-width: 26px;
  text-align: center;
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
}
.qty-num.has-qty { color: var(--primary); }

/* ─── SERVICES ─── */
.svc-item {
  display: flex;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
}
.svc-item:last-child { border-bottom: none; }
.svc-check {
  width: 24px; height: 24px;
  border-radius: 7px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.svc-check.on {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.svc-check.on::after { content: '✓'; font-size: 14px; font-weight: 700; }
.svc-info { flex: 1; }
.svc-name { font-size: 14px; font-weight: 600; }
.svc-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ─── BREAKDOWN ─── */
.breakdown {
  margin: 0 12px 10px;
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.breakdown-header {
  padding: 14px 16px 0;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
}
.breakdown-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 13px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.breakdown-item:last-child { border-bottom: none; }
.breakdown-item .bn { color: var(--text-muted); flex: 1; padding-right: 8px; }
.breakdown-item .bp { font-weight: 700; white-space: nowrap; }
.breakdown-total {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--primary-light);
  font-weight: 800;
  font-size: 15px;
  color: var(--primary);
}

/* ─── STICKY TOTAL ─── */
.sticky-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1px solid var(--border);
  padding: 12px 16px 16px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
  z-index: 100;
}
.sticky-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.sticky-label { font-size: 13px; color: var(--text-muted); }
.sticky-saving {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  margin-top: 2px;
}
.sticky-total {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}
.btn-copy {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--primary), #1e40af);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.2px;
  box-shadow: 0 4px 14px rgba(29,78,216,0.35);
  transition: opacity 0.15s;
}
.btn-copy:active { opacity: 0.88; }
.btn-kp {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #15803d, #16a34a);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.2px;
  box-shadow: 0 4px 14px rgba(22,163,74,0.35);
  transition: opacity 0.15s;
  margin-top: 8px;
}
.btn-kp:active { opacity: 0.88; }
.btn-reset {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 0 0;
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* ─── DELIVERY CALC ─── */
.svc-expand {
  display: none;
  background: #f0f4f8;
  border: 1.5px solid #cbd5e1;
  border-radius: 14px;
  padding: 14px;
  margin: 4px 0 8px 36px;
}
.svc-expand.show { display: block; }
.svc-expand-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: #64748b;
  margin-bottom: 12px;
}
.dlv-label { color: #1e293b !important; }
.dlv-result-row .rn { color: #64748b !important; }
.dlv-result-row .rv { color: #1e293b !important; font-weight: 600; }
.dlv-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 8px;
}
.dlv-label {
  font-size: 13px;
  color: var(--text);
  flex: 1;
  line-height: 1.3;
}
.dlv-input {
  width: 90px;
  padding: 8px 10px;
  border: 1.5px solid #cbd5e1;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  text-align: right;
  background: #ffffff;
  color: #1d4ed8;
  outline: none;
  flex-shrink: 0;
}
.dlv-input:focus { border-color: #1d4ed8; }
.dlv-input.small { width: 70px; }
.dlv-input[type="text"] { width: 100%; text-align: left; font-size: 13px; font-weight: 500; color: #1e293b; }
.btn-route {
  width: 100%; margin: 8px 0 4px;
  background: var(--primary); color: white;
  border: none; border-radius: 12px;
  padding: 11px; font-size: 14px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.3px;
}
.btn-route:disabled { opacity: 0.6; cursor: wait; }
.dlv-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 10px 0;
}
.dlv-result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  padding: 3px 0;
}
.dlv-result-row .rn { color: var(--text-muted); }
.dlv-result-row .rv { font-weight: 700; color: var(--text); }
.dlv-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--primary-light);
  border-radius: 10px;
  padding: 10px 12px;
  margin-top: 8px;
}
.dlv-total-row .tn { font-weight: 700; color: var(--primary); font-size: 13px; }
.dlv-total-row .tv { font-weight: 900; color: var(--primary); font-size: 17px; }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: #1e293b;
  color: white;
  padding: 14px 24px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 700;
  z-index: 999;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>🏕 TURIZMO 365</h1>
  <p>Внутренний калькулятор аренды</p>
</div>

<!-- VIP LEVEL -->
<div class="card">
  <div class="card-title">⭐ Уровень клиента</div>
  <div class="vip-row">
    <button class="vip-btn active" data-vip="ррц" onclick="setVip(this)">РРЦ<small>Стандарт</small></button>
    <button class="vip-btn" data-vip="vip1" onclick="setVip(this)">VIP1<small>−5%</small></button>
    <button class="vip-btn" data-vip="vip2" onclick="setVip(this)">VIP2<small>−15%</small></button>
    <button class="vip-btn" data-vip="vip3" onclick="setVip(this)">VIP3<small>−20%</small></button>
    <button class="vip-btn" data-vip="vip4" onclick="setVip(this)">VIP4<small>−25%</small></button>
  </div>
</div>

<!-- DAYS -->
<div class="card">
  <div class="card-title">📅 Количество суток аренды</div>
  <div class="days-row">
    <button class="btn-circle" onclick="changeDays(-1)">−</button>
    <div class="days-center">
      <div class="days-big" id="days-num">1</div>
      <div class="days-label">суток</div>
      <div class="days-rate-badge" id="rate-badge">Стандартный тариф</div>
    </div>
    <button class="btn-circle" onclick="changeDays(1)">+</button>
  </div>
  <div class="warn-box" id="warn-weekend">
    ⚠️ В выходные/праздники — минимум 3 суток
  </div>
</div>

<!-- EQUIPMENT -->
<div class="card">
  <div class="card-title">⛺ Снаряжение</div>
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="setCat('splav', this)">🚣 Сплавы</button>
    <button class="cat-tab" onclick="setCat('kemping', this)">🏕 Кемпинг</button>
    <button class="cat-tab" onclick="setCat('acc', this)">🎒 Аксессуары</button>
  </div>
  <div id="sec-splav" class="eq-section show"></div>
  <div id="sec-kemping" class="eq-section"></div>
  <div id="sec-acc" class="eq-section"></div>
</div>

<!-- SERVICES -->
<div class="card">
  <div class="card-title">🔧 Услуги и доп. расходы</div>
  <div id="services-list"></div>
</div>

<!-- BREAKDOWN -->
<div class="breakdown" id="breakdown" style="display:none"></div>

<!-- STICKY TOTAL -->
<div class="sticky-bar">
  <div class="sticky-row">
    <div>
      <div class="sticky-label">Итого к оплате</div>
      <div class="sticky-saving" id="saving-label"></div>
    </div>
    <div class="sticky-total" id="total-display">0 ₽</div>
  </div>
  <button class="btn-copy" id="btn-copy-html" onclick="copyCalc()">📋 Скопировать расчёт</button>
  <button class="btn-kp" id="btn-kp-html" onclick="generateKP()">📄 Сформировать КП</button>
  <div style="text-align:center;margin-top:8px">
    <button class="btn-reset" onclick="resetAll()">Сбросить всё</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

//  ДАННЫЕ
// ════════════════════════════════════════════

// КЕМПИНГ — цена за 7 дней аренды (РРЦ)

// ════════════════════════════════════════════
//  РАСЧЁТ ЦЕН
// ════════════════════════════════════════════
function boatPrice(boat, days) {
  if (days >= 1 && days <= 7) {
    const p = boat.prices[days - 1];
    if (p !== null && p !== undefined) return p;
    // SAP с 5+ тарифом
    if (boat.rate5plus) {
      const base4 = boat.prices[3];
      return base4 + (days - 4) * boat.rate5plus;
    }
    return boat.prices[6] || boat.prices[boat.prices.length - 1];
  }
  if (days >= 8 && days <= 14) {
    if (boat.rate8_14) return days * boat.rate8_14;
    if (boat.rate5plus) return boat.prices[3] + (days - 4) * boat.rate5plus;
  }
  if (days >= 15 && days <= 21) {
    if (boat.rate15_21) return days * boat.rate15_21;
    if (boat.rate5plus) return boat.prices[3] + (days - 4) * boat.rate5plus;
  }
  // Fallback
  if (boat.rate5plus) return boat.prices[3] + (days - 4) * boat.rate5plus;
  const rateDay = (boat.rate15_21 || boat.rate8_14 || boat.prices[6] / 7);
  return Math.round(days * rateDay);
}

function accPrice(item, days) {
  // flat за ≤7 дней, пропорционально сверх
  if (days <= 7) return item.price7;
  return Math.round(item.price7 / 7 * days);
}

function kempPrice(item, days) {
  if (days <= 7) return item.price7;
  return Math.round(item.price7 / 7 * days);
}

function applyDisc(price, cat) {
  const d = (DISC[cat] || DISC.boats)[S.vip] || 0;
  return Math.round(price * (1 - d));
}

function calcAll() {
  let total = 0, base = 0;
  const lines = [];

  BOATS.forEach(b => {
    const qty = S.qty[b.id] || 0;
    if (!qty) return;
    const bp = boatPrice(b, S.days);
    const vp = applyDisc(bp, 'boats');
    base += bp * qty;
    total += vp * qty;
    lines.push({ name: b.name, qty, price: vp * qty });
  });

  ACCS.forEach(a => {
    const qty = S.qty[a.id] || 0;
    if (!qty) return;
    const bp = accPrice(a, S.days);
    const vp = applyDisc(bp, 'acc');
    base += bp * qty;
    total += vp * qty;
    lines.push({ name: a.name, qty, price: vp * qty });
  });

  KEMP.forEach(k => {
    const qty = S.qty[k.id] || 0;
    if (!qty) return;
    const bp = kempPrice(k, S.days);
    const vp = applyDisc(bp, 'kemping');
    base += bp * qty;
    total += vp * qty;
    lines.push({ name: k.name, qty, price: vp * qty });
  });

  SVCS.forEach(s => {
    if (!S.svcs[s.id]) return;
    if (s.hasCalc) {
      if (transportPrice > 0) { total += transportPrice; base += transportPrice; lines.push({ name: s.name, qty:1, price: transportPrice }); }
      return;
    }
    // services with a fixed price (wash_palatka, wash_spalnyi)
    if (s.price) {
      total += s.price;
      base += s.price;
      lines.push({ name: s.name, qty: 1, price: s.price });
      return;
    }
    // "Включено" services with editable price
    const ep = S.svcPrices[s.id] || 0;
    if (ep > 0) {
      total += ep;
      base += ep;
      lines.push({ name: s.name, qty: 1, price: ep });
    }
  });

  return { total, savings: base - total, lines };
}

function fmt(n) {
  return n.toLocaleString('ru-RU') + ' ₽';

function rateLabel(days) {
  if (days <= 7) return `Тариф: фикс за ${days} сут.`;
  if (days <= 14) return 'Тариф: 8–14 дней (р/сутки)';
  return 'Тариф: 15–21 день (р/сутки)';
}

function vipLabel(v) {

    } else if (s.price) {
      priceStr = fmt(s.price);
    } else {
      const ep = S.svcPrices[s.id] || 0;
      priceStr = ep > 0 ? `<b style="color:var(--primary)">${fmt(ep)}</b>` : 'Включено';

function renderAll() {

function updateTotals() {
  const { total, savings, lines } = calcAll();
  document.getElementById('total-display').textContent = fmt(total);

  const savEl = document.getElementById('saving-label');
  savEl.textContent = (savings > 0 && S.vip !== 'ррц') ? `Скидка: ${fmt(savings)}` : '';

  document.getElementById('days-num').textContent = S.days;
  document.getElementById('rate-badge').textContent = rateLabel(S.days);

  // Breakdown
  const bEl = document.getElementById('breakdown');
  if (lines.length === 0) {
    bEl.style.display = 'none';
    return;
  }
  bEl.style.display = 'block';
  bEl.innerHTML = `<div class="breakdown-header">📋 Состав заказа</div>` +
    lines.map(l => `<div class="breakdown-item">
      <span class="bn">${l.name}${l.qty > 1 ? ` ×${l.qty}` : ''}</span>
      <span class="bp">${fmt(l.price)}</span>

function setVip(btn) {

  document.querySelectorAll('.vip-btn').forEach(b => b.classList.remove('active'));

function changeDays(d) {
  S.days = Math.max(1, Math.min(21, S.days + d));
  const warn = document.getElementById('warn-weekend');
  // Показываем предупреждение только как напоминание (менеджер сам знает дни)
  warn.classList.remove('show');
  renderAll();
}

function setCat(cat, btn) {
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['splav','kemping','acc'].forEach(c => {
    document.getElementById('sec-'+c).classList.toggle('show', c === cat);
  });
}

function chQty(id, delta) {
  S.qty[id] = Math.max(0, (S.qty[id] || 0) + delta);
  const el = document.getElementById('qn-' + id);
  if (el) {
    el.textContent = S.qty[id];
    el.classList.toggle('has-qty', S.qty[id] > 0);
  }
  updateTotals();
}

function toggleSvc(id) {
  S.svcs[id] = !S.svcs[id];
  if (S.svcs[id] && id === 'transport' && S.dlv.km > 0) computeTransport();
  renderServices();
  updateTotals();
}

function togglePickup() {
  S.dlv.withPickup = !S.dlv.withPickup;
  S.dlv.driverDays = S.dlv.withPickup ? 2 : 1;
  if (S.dlv.km > 0) computeTransport();
  renderServices();
  updateTotals();
}

function setDlvField(field, value) {
  S.dlv[field] = parseFloat(value) || 0;
  if (S.dlv.km > 0) {
    computeTransport();
    // Обновляем только итоги (без полного ре-рендера — фокус не теряется)
    const r = S.dlvResult;
    if (r) {
      const rows = document.querySelectorAll('.dlv-result-row .rv');
      if (rows.length >= 5) {
        rows[0].textContent = fmt2(r.costPerKm) + ' р/км';
        rows[1].textContent = fmt(r.tripCost);
        rows[2].textContent = fmt(r.salaryTotal);
        rows[3].textContent = fmt(r.cost);
        rows[4].textContent = fmt(r.profit);
      }
      const tv = document.querySelector('.dlv-total-row .tv');
      if (tv) tv.textContent = fmt(r.total);
    }
    updateTotals();
  }
}

function computeTransport() {
  const d = S.dlv;
  if (!d.km) return;
  const legs        = d.withPickup ? 4 : 2;
  const costPerKm   = (d.fuelPrice * d.fuelRate / 100) + d.amort; // л/100км
  const tripCost    = Math.round(costPerKm * d.km * legs);
  const salaryTotal = Math.round(d.salary * d.driverDays);
  const cost        = tripCost + salaryTotal;
  const profit      = Math.round(cost * d.margin / 100);
  const total       = cost + profit;
  S.dlvResult       = { costPerKm, tripCost, salaryTotal, cost, profit, total };
  transportPrice    = total;
}

// ─── Геокодирование + маршрут (OpenStreetMap/OSRM, бесплатно) ───
async function calcRoute() {
  const fromEl = document.getElementById('dlv-from');
  const toEl   = document.getElementById('dlv-to');
  const from   = (fromEl ? fromEl.value : '') || S.dlv.addrFrom;
  const to     = (toEl   ? toEl.value   : '') || S.dlv.addrTo;
  S.dlv.addrFrom = from; S.dlv.addrTo = to;

  const btn    = document.getElementById('btn-route');
  const status = document.getElementById('route-status');
  if (!from || !to) { status.textContent = '⚠️ Введите оба адреса'; return; }

  btn.disabled = true; btn.textContent = '⏳ Считаем...';
  status.textContent = '';

  try {
    const geo = async (q) => {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&accept-language=ru`,
        { headers: { 'User-Agent': 'turizmo365-calc/1.0' } }
      );
      const j = await r.json();
      if (!j.length) throw new Error(`Адрес не найден: "${q}"`);
      return { lat: parseFloat(j[0].lat), lon: parseFloat(j[0].lon) };
    };

    const [A, B] = await Promise.all([geo(from), geo(to)]);
    const route  = await fetch(
      `https://router.project-osrm.org/route/v1/driving/${A.lon},${A.lat};${B.lon},${B.lat}?overview=false`
    );
    const rj = await route.json();
    if (rj.code !== 'Ok') throw new Error('Маршрут не найден (OSRM)');

    const km = Math.round(rj.routes[0].distance / 1000);
    S.dlv.km = km;
    computeTransport();
    renderServices();
    updateTotals();
    // восстановить адреса в полях после рендера
    setTimeout(() => {
      const f = document.getElementById('dlv-from');
      const t = document.getElementById('dlv-to');
      if (f) f.value = from;
      if (t) t.value = to;
      if (status) status.innerHTML = `✅ Маршрут: <b>${km} км</b> в одну сторону`;
    }, 0);
  } catch(e) {
    status.textContent = '❌ ' + e.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🗺 Рассчитать маршрут'; }
  }
}

function fmt2(n) { return (+n).toFixed(2); }

function resetAll() {
  S.qty = {};
  S.svcs = {};
  S.vip = 'ррц';
  S.days = 1;
  transportPrice = 0;
  S.dlvResult = null;
  S.dlv = { addrFrom:'', addrTo:'', km:0, fuelPrice:74, fuelRate:10, amort:3.8, salary:6000, driverDays:1, withPickup:false, margin:60 };
  document.querySelectorAll('.vip-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  renderAll();
}

function copyCalc() {
  const { total, savings, lines } = calcAll();
  if (lines.length === 0) {
    showToast('⚠️ Добавьте снаряжение!');
    return;
  }

  const checkedSvcs = SVCS.filter(s => S.svcs[s.id]).map(s => {
    if (s.hasCalc && transportPrice > 0) return `• ${s.name}: ${fmt(transportPrice)}`;
    return `• ${s.name}${s.price ? ': ' + fmt(s.price) : ' (включено)'}`;
  });

  let text = `🏕 TURIZMO 365 — Расчёт аренды\n`;
  text += `${'─'.repeat(28)}\n`;
  text += `📅 Срок: ${S.days} ${dayWord(S.days)}\n`;
  text += `⭐ Уровень: ${vipLabel(S.vip)}\n`;
  text += `${'─'.repeat(28)}\n`;
  text += `📦 Снаряжение:\n`;
  lines.filter(l => !SVCS.find(s => s.name === l.name))
       .forEach(l => { text += `  • ${l.name}${l.qty>1?' ×'+l.qty:''} — ${fmt(l.price)}\n`; });
  if (checkedSvcs.length) {
    text += `\n🔧 Услуги:\n`;
    checkedSvcs.forEach(s => { text += `  ${s}\n`; });
  }
  text += `${'─'.repeat(28)}\n`;
  text += `💰 ИТОГО: ${fmt(total)}`;
  if (savings > 0 && S.vip !== 'ррц') text += `\n✅ Скидка: ${fmt(savings)}`;

  navigator.clipboard.writeText(text)
    .then(() => showToast('✅ Скопировано!'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast('✅ Скопировано!'); }
      catch(e) { showToast('❌ Не удалось скопировать'); }
      document.body.removeChild(ta);
    });
}

function dayWord(n) {
  if (n === 1) return 'сутки';
  if (n >= 2 && n <= 4) return 'суток';
  return 'суток';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

(function initTelegram() {
  const tg = window.Telegram?.WebApp;
  if (!tg) return; // запуск в браузере — всё работает и без этого

  tg.ready();
  tg.expand(); // на весь экран

  // Скрываем HTML-кнопку — вместо неё используем нативную MainButton Telegram
  const htmlCopyBtn = document.getElementById('btn-copy-html');
  if (htmlCopyBtn) htmlCopyBtn.style.display = 'none';

  // Нижняя нативная кнопка Telegram — «Скопировать расчёт»
  const mb = tg.MainButton;
  mb.setText('📋 Скопировать расчёт');
  mb.color = '#1d4ed8';
  mb.textColor = '#ffffff';

  // Показывать кнопку только когда есть что-то в заказе
  function syncMainButton() {
    const { lines } = calcAll();
    if (lines.length > 0) mb.show();
    else mb.hide();
  }

  mb.onClick(function() {
    copyCalc();
  });

  // Перехватим updateTotals чтобы синхронизировать кнопку
  const _orig = updateTotals;
  window.updateTotals = function() { _orig(); syncMainButton(); };

  syncMainButton();
})();

    </tr>` : '';

  const kpHtml = `<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; color: #1e293b; margin: 0; padding: 32px; font-size: 14px; }
    .header { background: linear-gradient(135deg,#1e3a8a,#2563eb); color:white; padding:24px 28px; border-radius:12px; margin-bottom:24px; }
    .header h1 { margin:0; font-size:22px; font-weight:800; }
    .header p { margin:4px 0 0; font-size:13px; opacity:.8; }
    .meta { display:flex; gap:32px; margin-bottom:24px; font-size:13px; }
    .meta-item { }
    .meta-item b { display:block; color:#64748b; font-size:11px; text-transform:uppercase; margin-bottom:2px; }
    table { width:100%; border-collapse:collapse; margin-bottom:16px; }
    th { background:#f0f4f8; padding:10px 12px; text-align:left; font-size:12px; text-transform:uppercase; color:#64748b; letter-spacing:.5px; }
    th:last-child { text-align:right; }
    .total-row td { padding:10px 12px; font-weight:700; font-size:16px; background:#eff6ff; border-top:2px solid #1d4ed8; color:#1d4ed8; }
    .total-row td:last-child { text-align:right; }
    .footer { margin-top:32px; font-size:12px; color:#94a3b8; text-align:center; border-top:1px solid #e2e8f0; padding-top:16px; }
    .badge { display:inline-block; background:#fef9c3; color:#b45309; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
  </style></head><body>
  <div class="header">
    <h1>🏕 TURIZMO 365</h1>
    <p>Коммерческое предложение · Аренда туристического снаряжения</p>
  </div>
  <div class="meta">
    <div class="meta-item"><b>Дата</b>${today}</div>
    <div class="meta-item"><b>Срок аренды</b>${dayText}</div>
    <div class="meta-item"><b>Уровень</b><span class="badge">${vipLabel}</span></div>
  </div>
  <table>
    <thead><tr><th>Позиция</th><th style="text-align:right;">Сумма</th></tr></thead>
    <tbody>
      ${rowsHtml}
      ${savingsRow}
    </tbody>
    <tfoot><tr class="total-row"><td>ИТОГО К ОПЛАТЕ</td><td>${total.toLocaleString('ru-RU')} ₽</td></tr></tfoot>
  </table>
  <p style="font-size:12px;color:#64748b;margin-top:8px;">
    * В стоимость входит снаряжение в полной комплектации. Оплата при получении или по реквизитам.
  </p>
  <div class="footer">TURIZMO 365 · @Turizmo365bot · Генерация: ${today}</div>
  </body></html>`;

  const el = document.createElement('div');
  el.innerHTML = kpHtml;
  el.style.cssText = 'position:fixed;left:-9999px;top:0;width:650px;';
  document.body.appendChild(el);

  html2pdf().set({
    margin: 0,
    filename: `КП_TURIZMO365_${new Date().toISOString().slice(0,10)}.pdf`,
    image: { type:'jpeg', quality:0.97 },
    html2canvas: { scale:2, useCORS:true },
    jsPDF: { unit:'mm', format:'a4', orientation:'portrait' }

}
